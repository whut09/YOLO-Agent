goal:
  baseline_model: yolo26s.pt
  dataset: COCO2017
  validation_split: val2017
  primary_metric: map50_95
  target_delta_points: 2.0
  minimum_seeds: 3
  equal_training_budget_required: true
  notes:
    - Do not claim improvement unless metrics are verified on COCO val2017.
    - Compare against the same epochs, imgsz, optimizer, auto-batch policy, and seed set.
    - Report possible contribution unless repeated seeds support a confidence interval.

training:
  model: yolo26s.pt
  data: configs/datasets/coco.yaml
  project: runs/ultralytics
  task: detect
  epochs: 100
  imgsz: 640
  batch: auto
  device: "0"
  workers: 8
  amp: true
  patience: 50
  timeout_seconds:
  baseline_acceptance:
    enabled: true
    required_metric_candidates: [map50_95, coco_ap50_95]
    required_artifacts: [results_csv, best_pt, args_yaml]
    required_imgsz: 640
    allowed_profiles: [baseline_full, baseline_confirm]
    minimum_seeds: 3
    require_dataset_manifest_match: true
    allow_explained_bottleneck: true
    enforce_coco_baseline_evidence: true
  candidate_promotion:
    enabled: true
    required_debug_metric: fast_baseline_sanity_passed
    required_pilot_metric: fast_baseline_pilot_passed
    minimum_improved_error_facts: 1
    max_latency_regression_ratio: 0.10
    max_epoch_time_regression_ratio: 0.20
    max_runtime_throughput_drop_ratio: 0.20
    require_runtime_comparison: true
  data_cache_policy:
    enabled: true
    candidate_cache_modes: [ram, disk, "False"]
    decoded_ram_multiplier: 3.0
    min_free_ram_after_cache_gb: 8.0
    ram_cache_max_available_fraction: 0.75
    disk_cache_requires_nvme: true
    respect_explicit_cache: false
    worker_increment_on_no_cache: 4
    max_workers: 16
  batch_tuning:
    enabled: true
    candidate_batches: [32, 48, 64, 96]
    auto_expand_candidates: true
    trial_epochs: 1
    trial_fraction: 0.01
    timeout_seconds: 180
    sample_interval_seconds: 2.0
  budget_profile: debug
  fast_baseline_gate:
    enabled: true
    minimum_confirmation_seeds: 3
  stop_resume:
    enabled: true
    stop_on_trigger: false
    low_gpu_util_threshold: 40.0
    low_gpu_duration_seconds: 600.0
    low_gpu_min_samples: 3
    early_map_metric: metrics/mAP50-95(B)
    early_map_max_epoch: 10
    early_map_drop_threshold: 0.05
  budget_profiles:
    debug:
      name: debug
      description: 1 epoch sanity run on 1% COCO; never use for model claims.
      fraction: 0.01
      epochs: 1
      batch: auto
      val: false
      quick_val: true
      timeout_seconds: 3600
      seeds: [1]
      overrides:
        plots: false
        save_json: false
    pilot:
      name: pilot
      description: 10% COCO screening run with BatchTuner-selected batch before full-budget promotion.
      fraction: 0.1
      epochs: 10
      batch: auto
      val: true
      quick_val: true
      timeout_seconds: 43200
      seeds: [1]
      overrides:
        plots: false
        save_json: false
    baseline_full:
      name: baseline_full
      description: Full COCO single-seed baseline budget; use before 3-seed confirmation.
      fraction: 1.0
      epochs: 100
      batch: auto
      val: true
      quick_val: false
      seeds: [1]
      overrides:
        plots: true
        save_json: true
    baseline_confirm:
      name: baseline_confirm
      description: Full COCO 3-seed confirmation after the single-seed baseline passes.
      fraction: 1.0
      epochs: 100
      batch: auto
      val: true
      quick_val: false
      seeds: [1, 2, 3]
      confirms_contribution: true
      overrides:
        plots: true
        save_json: true
    candidate_full:
      name: candidate_full
      description: Full COCO candidate budget; only candidates that pass pilot should use it.
      fraction: 1.0
      epochs: 100
      batch: auto
      val: true
      quick_val: false
      seeds: [1, 2, 3]
      requires_pilot_pass: true
      confirms_contribution: true
      overrides:
        plots: true
        save_json: true
  overrides:
    plots: true
    save_json: true
    val: true
    cos_lr: true

protocol:
  seeds:
    - 1
    - 2
    - 3
  baseline:
    candidate_id: yolo26s_coco_baseline
    model_family: yolo26
    model: yolo26s.pt
  improvement_target:
    metric: map50_95
    delta_points: 2.0
    required_evidence:
      - repeated_seed_metrics
      - results_csv
      - best_pt
      - model_size_mb
      - latency_ms
