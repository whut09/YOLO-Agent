goal:
  baseline_model: yolo26s.pt
  dataset: COCO2017
  validation_split: val2017
  primary_metric: map50_95
  target_delta_points: 2.0
  minimum_seeds: 3
  equal_training_budget_required: true
  notes:
    - Do not claim improvement unless metrics are verified on COCO val2017.
    - Compare against the same epochs, imgsz, optimizer, batch policy, and seed set.
    - Report possible contribution unless repeated seeds support a confidence interval.

training:
  model: yolo26s.pt
  data: configs/datasets/coco.yaml
  project: runs/ultralytics
  task: detect
  epochs: 100
  imgsz: 640
  batch: 64
  device: "0"
  workers: 8
  amp: true
  patience: 50
  timeout_seconds:
  data_cache_policy:
    enabled: true
    candidate_cache_modes: [ram, disk, "False"]
    decoded_ram_multiplier: 3.0
    min_free_ram_after_cache_gb: 8.0
    ram_cache_max_available_fraction: 0.75
    disk_cache_requires_nvme: true
    respect_explicit_cache: false
    worker_increment_on_no_cache: 4
    max_workers: 16
  batch_tuning:
    enabled: true
    candidate_batches: [32, 48, 64, 96]
    trial_epochs: 1
    trial_fraction: 0.01
    timeout_seconds: 900
    sample_interval_seconds: 2.0
  budget_profile: debug
  fast_baseline_gate:
    enabled: true
    minimum_confirmation_seeds: 3
  budget_profiles:
    debug:
      name: debug
      description: 1 epoch sanity run on 1% COCO; never use for model claims.
      fraction: 0.01
      epochs: 1
      batch: auto
      val: false
      quick_val: true
      seeds: [1]
      overrides:
        plots: false
        save_json: false
    pilot:
      name: pilot
      description: 10% COCO screening run with fixed batch before full-budget promotion.
      fraction: 0.1
      epochs: 10
      batch: 64
      val: true
      quick_val: true
      seeds: [1]
      overrides:
        plots: false
        save_json: false
    baseline_full:
      name: baseline_full
      description: Full COCO single-seed baseline budget; use before 3-seed confirmation.
      fraction: 1.0
      epochs: 100
      batch: 64
      val: true
      quick_val: false
      seeds: [1]
      overrides:
        plots: true
        save_json: true
    baseline_confirm:
      name: baseline_confirm
      description: Full COCO 3-seed confirmation after the single-seed baseline passes.
      fraction: 1.0
      epochs: 100
      batch: 64
      val: true
      quick_val: false
      seeds: [1, 2, 3]
      confirms_contribution: true
      overrides:
        plots: true
        save_json: true
    candidate_full:
      name: candidate_full
      description: Full COCO candidate budget; only candidates that pass pilot should use it.
      fraction: 1.0
      epochs: 100
      batch: 64
      val: true
      quick_val: false
      seeds: [1, 2, 3]
      requires_pilot_pass: true
      confirms_contribution: true
      overrides:
        plots: true
        save_json: true
  overrides:
    plots: true
    save_json: true
    val: true
    cos_lr: true

protocol:
  seeds:
    - 1
    - 2
    - 3
  baseline:
    candidate_id: yolo26s_coco_baseline
    model_family: yolo26
    model: yolo26s.pt
  improvement_target:
    metric: map50_95
    delta_points: 2.0
    required_evidence:
      - repeated_seed_metrics
      - results_csv
      - best_pt
      - model_size_mb
      - latency_ms
