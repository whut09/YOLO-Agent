strategies:
  standard_nms:
    name: Standard NMS
    family: nms
    description: Default greedy non-maximum suppression.
    target_scenarios:
      - generic
      - edge_realtime
      - traffic_edge
    target_problems:
      - default_inference
      - low_latency
    parameters:
      iou_threshold: 0.7
    latency_cost: low
    accuracy_risk: low
    deployment_notes:
      - Fast and widely supported by export runtimes.

  class_aware_nms:
    name: Class-Aware NMS
    family: nms
    description: Apply NMS independently per class to avoid cross-class suppression.
    target_scenarios:
      - crowded_scene
      - industrial_defect
      - traffic_edge
    target_problems:
      - class_confusion
      - crowded_objects
      - class_overlap
    parameters:
      iou_threshold: 0.65
      class_agnostic: false
    latency_cost: low
    accuracy_risk: medium
    deployment_notes:
      - Useful when visually similar classes overlap, but can increase duplicate boxes.

  soft_nms:
    name: Soft-NMS
    family: nms
    description: Decay overlapping boxes instead of suppressing them hard.
    target_scenarios:
      - crowded_scene
    target_problems:
      - crowded_objects
      - occlusion
    parameters:
      iou_threshold: 0.6
      sigma: 0.5
    latency_cost: medium
    accuracy_risk: medium
    deployment_notes:
      - Validate runtime support before deployment.

  diou_nms:
    name: DIoU-NMS
    family: nms
    description: Distance-IoU aware NMS for overlapping objects.
    target_scenarios:
      - crowded_scene
      - traffic_edge
    target_problems:
      - crowded_objects
      - localization_error
    parameters:
      iou_threshold: 0.65
    latency_cost: medium
    accuracy_risk: medium
    deployment_notes:
      - Useful when center distance helps separate nearby objects.

  weighted_box_fusion:
    name: Weighted Box Fusion
    family: fusion
    description: Fuse boxes from ensembles, TTA, or multi-scale inference.
    target_scenarios:
      - crowded_scene
      - drone_small_object
      - infrared_small_target
    target_problems:
      - multi_scale_objects
      - tiny_objects
      - ensemble_fusion
    parameters:
      iou_threshold: 0.55
    latency_cost: high
    accuracy_risk: medium
    deployment_notes:
      - Usually better suited for offline or server-side inference.

  dynamic_conf_threshold:
    name: Dynamic Confidence Threshold
    family: threshold
    description: Tune confidence threshold from validation distribution or runtime conditions.
    target_scenarios:
      - generic
      - industrial_defect
    target_problems:
      - precision_recall_tradeoff
    parameters:
      min_conf: 0.05
      max_conf: 0.7
    latency_cost: low
    accuracy_risk: medium
    deployment_notes:
      - Must be calibrated on validation data.

  low_conf_threshold:
    name: Low Confidence Threshold
    family: threshold
    description: Lower the confidence threshold to expose more candidates for recall-oriented workflows.
    target_scenarios:
      - infrared_small_target
      - drone_small_object
    target_problems:
      - small_object_miss
      - low_recall
    parameters:
      conf: 0.12
      requires_validation_sweep: true
    companion_actions:
      - validate_precision_drop
      - consider_nwd_loss
    latency_cost: low
    accuracy_risk: medium
    deployment_notes:
      - Pair with stronger NMS or review precision before deployment.

  recall_first_threshold:
    name: Recall-First Threshold
    family: threshold
    description: Select a confidence threshold from validation PR curves to prioritize recall.
    target_scenarios:
      - infrared_small_target
      - drone_small_object
      - industrial_defect
    target_problems:
      - false_negative
      - low_recall
      - small_object_miss
    parameters:
      target_recall_floor: 0.95
      max_precision_drop: 0.08
    companion_actions:
      - inspect_false_positive_budget
    latency_cost: low
    accuracy_risk: medium
    deployment_notes:
      - Do not use without validation PR evidence.

  precision_first_threshold:
    name: Precision-First Threshold
    family: threshold
    description: Select a confidence threshold from validation PR curves to suppress false positives.
    target_scenarios:
      - edge_realtime
      - traffic_edge
      - industrial_defect
    target_problems:
      - background_confusion
      - hard_negative
      - low_precision
    parameters:
      target_precision_floor: 0.98
      max_recall_drop: 0.05
    companion_actions:
      - add_hard_negative_mining
      - audit_background_false_positives
    latency_cost: low
    accuracy_risk: medium
    deployment_notes:
      - Monitor recall loss after raising thresholds.

  per_class_threshold:
    name: Per-Class Threshold
    family: threshold
    description: Use class-specific confidence thresholds.
    target_scenarios:
      - crowded_scene
      - industrial_defect
      - traffic_edge
    target_problems:
      - class_imbalance
      - class_confusion
      - long_tail_bias
    parameters:
      default_conf: 0.25
    latency_cost: low
    accuracy_risk: medium
    deployment_notes:
      - Requires per-class validation metrics.

  temperature_scaling:
    name: Temperature Scaling
    family: calibration
    description: Calibrate class confidence scores after validation.
    target_scenarios:
      - generic
      - industrial_defect
    target_problems:
      - confidence_miscalibration
      - false_alarms
    parameters:
      temperature: 1.0
    latency_cost: low
    accuracy_risk: low
    deployment_notes:
      - Does not fix localization errors.

  single_scale:
    name: Single-Scale Inference
    family: scale
    description: Run one fixed inference scale.
    target_scenarios:
      - edge_realtime
      - traffic_edge
    target_problems:
      - low_latency
    parameters:
      scale_count: 1
    latency_cost: low
    accuracy_risk: medium
    deployment_notes:
      - Preferred for strict FPS targets.

  high_conf_threshold:
    name: High Confidence Threshold
    family: threshold
    description: Raise confidence threshold to suppress false positives.
    target_scenarios:
      - edge_realtime
      - traffic_edge
    target_problems:
      - false_positive_control
      - low_latency
    parameters:
      conf: 0.45
    latency_cost: low
    accuracy_risk: medium
    deployment_notes:
      - Monitor recall after increasing confidence threshold.

  multi_scale_inference:
    name: Multi-Scale Inference
    family: scale
    description: Run multiple inference scales and merge predictions.
    target_scenarios:
      - crowded_scene
      - drone_small_object
      - infrared_small_target
    target_problems:
      - small_object_miss
      - multi_scale_objects
    parameters:
      scales:
        - 0.75
        - 1.0
        - 1.25
    latency_cost: high
    accuracy_risk: low
    deployment_notes:
      - Avoid on strict edge realtime deployments.

  multi_scale_tta:
    name: Multi-Scale TTA
    family: tta
    description: Test-time augmentation with multiple scales.
    target_scenarios:
      - crowded_scene
      - drone_small_object
    target_problems:
      - crowded_objects
      - small_object_miss
    parameters:
      scales:
        - 0.8
        - 1.0
        - 1.2
    latency_cost: high
    accuracy_risk: low
    deployment_notes:
      - Use when accuracy matters more than latency.

  flip_tta:
    name: Flip TTA
    family: tta
    description: Horizontal flip test-time augmentation.
    target_scenarios:
      - generic
      - crowded_scene
    target_problems:
      - robustness
    parameters:
      flip: horizontal
    latency_cost: medium
    accuracy_risk: low
    deployment_notes:
      - Validate for asymmetric domains such as road signs or text.

  sahi_slicing:
    name: SAHI Slicing Inference
    family: slicing
    description: Slice large images into overlapping tiles for small-object detection.
    target_scenarios:
      - infrared_small_target
      - drone_small_object
    target_problems:
      - small_object_miss
      - tiny_objects
    parameters:
      slice_size: 640
      overlap_ratio: 0.2
    latency_cost: high
    accuracy_risk: medium
    deployment_notes:
      - Small-object powerhouse, but increases latency and merge complexity.
    companion_actions:
      - validate_tile_overlap
      - consider_nwd_loss

recommendations:
  crowded_scene:
    - soft_nms
    - class_aware_nms
    - per_class_threshold
    - multi_scale_tta
  edge_realtime:
    - standard_nms
    - single_scale
    - high_conf_threshold
  traffic_edge:
    - standard_nms
    - single_scale
    - high_conf_threshold
  infrared_small_target:
    - standard_nms
    - low_conf_threshold
    - recall_first_threshold
    - sahi_slicing
    - multi_scale_inference
    - weighted_box_fusion
  drone_small_object:
    - sahi_slicing
    - multi_scale_inference
    - weighted_box_fusion
  industrial_defect:
    - standard_nms
    - class_aware_nms
    - per_class_threshold
    - temperature_scaling
  generic:
    - standard_nms
    - dynamic_conf_threshold

error_recommendations:
  small_object_miss:
    - low_conf_threshold
    - recall_first_threshold
    - sahi_slicing
    - multi_scale_inference
  background_confusion:
    - precision_first_threshold
    - class_aware_nms
    - standard_nms
  hard_negative:
    - precision_first_threshold
    - high_conf_threshold
  low_contrast_miss:
    - recall_first_threshold
    - multi_scale_inference
  occlusion_miss:
    - soft_nms
    - class_aware_nms
  class_confusion:
    - class_aware_nms
    - per_class_threshold
    - temperature_scaling
  loose_box:
    - diou_nms
  shifted_box:
    - diou_nms
